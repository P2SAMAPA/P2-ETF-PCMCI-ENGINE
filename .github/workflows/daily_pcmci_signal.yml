name: Daily PCMCI+ Signal

on:
  schedule:
    - cron: "0 23 * * 1-5"   # 23:00 UTC Mon-Fri (after DeePM at 22:30)
  workflow_dispatch:
    inputs:
      option:
        description: "Option to run (A, B, or both)"
        required: false
        default: "both"

jobs:
  pcmci-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements_train.txt

      - name: Run PCMCI+ pipeline
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_DATASET_REPO: ${{ secrets.HF_DATASET_REPO }}
          HF_RESULTS_REPO: ${{ secrets.HF_RESULTS_REPO }}
        run: |
          OPTION="${{ github.event.inputs.option || 'both' }}"
          python train_and_predict.py --option $OPTION

      - name: Upload results to HuggingFace
        env:
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_RESULTS_REPO: ${{ secrets.HF_RESULTS_REPO }}
        run: python upload_results.py
      - name: Done
        run: echo "PCMCI+ pipeline complete."
